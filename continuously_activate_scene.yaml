blueprint:
  name: Circadian Rythm Lighting
  description: |
    ## Circadian Rhythm Lighting! 🌅☀️🌙
    **⚠️ Requires the [Scene Extrapolation](https://github.com/etokheim/scene-extrapolation) integration.**

    🔄 *This automation activates your extrapolation scene in a continuous loop so your lighting always matches the time of day!*

    The automation automatically stops if:
    - The lights in the area have been turned off
    - (Optional) The scene's `brightness_modifier` or `transition_modifier` is not 0
  source_url: https://github.com/etokheim/home-assistant-automations/blob/master/continuously_activate_scene.yaml
  author: Erling Tokheim
  domain: automation

  input:
    area_id:
      name: Area
      description: The area where the `continuous scene` is located. The script gets all of this area's scenes and checks if the `continuous scene` was the last to be activated among them.
      default: ""
      selector:
        area:

    continuous_scene:
      name: Continuous Scene
      description: Select the Scene Extrapolation scene to be continuously activated
      selector:
        entity:
          domain: scene
          integration: scene_extrapolation
          multiple: false

    stop_on_modifiers:
      name: Stop on modifiers
      description: Stop the automation if brightness_modifier or transition_modifier is not 0
      default: true
      selector:
        boolean:

mode: restart

variables:
  area_id: !input "area_id"
  continuous_scene: !input "continuous_scene"
  stop_on_modifiers: !input "stop_on_modifiers"
  loop_interval: 300

# Doesn't work (reliably) anymore (only matches string, not lists. Scene.turn_on gives a list)
# trigger:
#   - platform: event
#     event_type: call_service
#     event_data:
#       domain: scene
#       service: turn_on
#       service_data:
#         entity_id: !input continuous_scene

trigger:
  - platform: event
    event_type: call_service
    event_data:
      domain: scene
      service: turn_on
  - platform: event
    event_type: call_service
    event_data:
      domain: scene_extrapolation
      service: turn_on

condition:
  - condition: template
    value_template: >
      {% set e = trigger.event.data.service_data.entity_id %}
      {% if e is string %}
        {{ e == continuous_scene }}
      {% elif e is list %}
        {{ continuous_scene in e }}
      {% else %}
        false
      {% endif %}

action:
  - alias: Start by waiting the configured amount of time (as the scene was just activated)
    delay:
      seconds: "{{ loop_interval }}"

  - repeat:
      while:
        - condition: and
          conditions:
            - alias: If the last activated scene in the area is the continuous_scene
              condition: template
              value_template: >
                {%- set area_scenes = states.scene | selectattr('entity_id', 'in', area_entities(area_id)) | map(attribute='entity_id') | list -%}
                {%- set scenes_sorted_by_activation = expand(area_scenes) | sort(attribute='state', reverse = true) | map(attribute='entity_id') | list -%}
                {%- set last_activated_scene = scenes_sorted_by_activation[0] -%}
                {%- if last_activated_scene == continuous_scene -%}
                  {{ true }}
                {%- else -%}
                  {{ false }}
                {%- endif -%}

            - alias: And any of the lights in the area is on
              condition: template
              value_template: >
                {#- True if any of the lights in the specified area is on -#}
                {%-
                  set lights = states.light 
                    | selectattr('entity_id', 'in', area_entities(area_id))
                    | selectattr("state", "eq", "on")
                    | map(attribute='entity_id')
                    | list
                -%}
                {%- if lights | length != 0 -%}
                  {{ true }}
                {%- else -%}
                  {{ false }}
                {%- endif -%}

            - alias: And brightness_modifier and transition_modifier are both 0 (if enabled)
              condition: template
              value_template: >
                {%- if stop_on_modifiers -%}
                  {%- set brightness_mod = state_attr(continuous_scene, 'brightness_modifier') | default(0) -%}
                  {%- set transition_mod = state_attr(continuous_scene, 'transition_modifier') | default(0) -%}
                  {{ brightness_mod == 0 and transition_mod == 0 }}
                {%- else -%}
                  {{ true }}
                {%- endif -%}

      sequence:
        - alias: Activate the continuous_scene
          service: scene.turn_on
          data_template:
            transition: "{{ loop_interval }}"
            entity_id: !input continuous_scene

        - alias: Wait 5 minutes
          delay:
            seconds: "{{ loop_interval }}"
